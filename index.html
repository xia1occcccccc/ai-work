<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI大模型参数工具 - 朱杰颖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>AI大模型在线参数调试工具</h1>
            <h2>学号：202535720134 | 姓名：朱杰颖</h2>
        </div>

        <div class="params">
            <h3>⚙️ 模型参数调整</h3>
            <div class="item">
                <label>：</label>
                <input type="range" min="0" max="2" step="0.1" value="0.7" id="temp">
                <span id="tempText">0.7</span>
            </div>
            <div class="item">
                <label>最大回复长度：</label>
                <input type="number" value="500" min="100" max="2000" id="length">
            </div>
            <div class="item">
                <label>回复风格：</label>
                <select id="style">
                    <option>严谨专业</option>
                    <option>轻松幽默</option>
                    <option>创意发散</option>
                </select>
            </div>
            <button onclick="saveParams()">应用参数</button>
        </div>
        <div class="info">
            <h3>项目特性</h3>
            <p>在线共用：所有人点开链接即可使用</p>
            <p>可迁移：支持通义千问/文心一言/扣子AI等所有大模型</p>
            <p>可优化：可新增参数、界面美化、功能扩展</p>
            <p>前沿AI：基于大模型交互的标准参数工具</p>
        </div>

        <div id="tip">参数已应用！</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
